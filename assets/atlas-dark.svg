<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif"
     role="img" aria-label="skillsig architecture: skill folders (SKILL.md allowed-tools plus SKILLSIG.yaml manifest) are parsed, then the scope engine diffs declared scope against actual grants and the lockfile baseline, the verifier checks the Sigstore or ed25519 bundle, and the report prints a TRUSTED / UNSIGNED / SCOPE-DRIFTED table that gates CI">
  <defs>
    <marker id="ah-d" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5A5A66"/></marker>
  </defs>
  <rect x="0" y="0" width="880" height="380" fill="#1D1D1F"/>

  <!-- trust-boundary frame -->
  <rect x="24" y="26" width="832" height="276" rx="18" fill="none" stroke="#F87171" stroke-opacity="0.45" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="44" y="48" font-size="13" font-weight="600" fill="#F8A39B">trust boundary — local-only verify, no network egress</text>

  <!-- connectors -->
  <g stroke="#3A3A44" stroke-width="1.6" fill="none">
    <line x1="226" y1="172" x2="288" y2="172" marker-end="url(#ah-d)"/>
    <line x1="438" y1="172" x2="500" y2="172" marker-end="url(#ah-d)"/>
    <line x1="650" y1="172" x2="712" y2="172" marker-end="url(#ah-d)"/>
  </g>

  <!-- Skill inputs -->
  <g>
    <rect x="40" y="84" width="186" height="176" rx="15" fill="#94A3B8" fill-opacity="0.10" stroke="#94A3B8" stroke-width="1.5"/>
    <text x="133" y="110" text-anchor="middle" font-size="15" font-weight="600" fill="#CBD5E1">Skill folders</text>
    <g font-size="11" fill="#CBD5E1">
      <rect x="58" y="126" width="150" height="56" rx="9" fill="#94A3B8" fill-opacity="0.09" stroke="#94A3B8" stroke-width="1.1"/>
      <text x="70" y="144" font-weight="600" fill="#E2E8F0">SKILL.md</text>
      <text x="70" y="162">allowed-tools (actuals)</text>
      <text x="70" y="176" fill="#A1A1A8">model · network hints</text>
      <rect x="58" y="190" width="150" height="56" rx="9" fill="#F87171" fill-opacity="0.12" stroke="#F87171" stroke-width="1.1"/>
      <text x="70" y="208" font-weight="600" fill="#F8A39B">SKILLSIG.yaml</text>
      <text x="70" y="226" fill="#F8A39B">declares: model · tools</text>
      <text x="70" y="240" fill="#F8A39B">fs_write · network_egress</text>
    </g>
  </g>

  <!-- Parser -->
  <g>
    <rect x="288" y="84" width="150" height="176" rx="15" fill="#4DA3FF" fill-opacity="0.12" stroke="#4DA3FF" stroke-width="1.5"/>
    <text x="363" y="110" text-anchor="middle" font-size="15" font-weight="600" fill="#9CCBFF">Parser</text>
    <g font-size="11.5" fill="#9CCBFF">
      <text x="363" y="146" text-anchor="middle">FindSkillDirs</text>
      <text x="363" y="170" text-anchor="middle">ParseSkill</text>
      <text x="363" y="200" text-anchor="middle" font-size="10.5" fill="#A1A1A8">frontmatter +</text>
      <text x="363" y="216" text-anchor="middle" font-size="10.5" fill="#A1A1A8">sidecar manifest</text>
      <text x="363" y="240" text-anchor="middle" font-size="10.5" fill="#A1A1A8">→ canonical scope</text>
    </g>
  </g>

  <!-- Scope engine -->
  <g>
    <rect x="500" y="84" width="150" height="176" rx="15" fill="#FB923C" fill-opacity="0.14" stroke="#FB923C" stroke-width="1.6"/>
    <text x="575" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#FBC08A">Scope engine</text>
    <g font-size="11" fill="#FBC08A">
      <rect x="516" y="124" width="118" height="40" rx="9" fill="#000000" fill-opacity="0.25" stroke="#FB923C" stroke-width="1.1"/>
      <text x="528" y="140" font-weight="600">allowlist diff</text>
      <text x="528" y="155" font-size="10">tools vs grants</text>
      <rect x="516" y="170" width="118" height="40" rx="9" fill="#000000" fill-opacity="0.25" stroke="#FB923C" stroke-width="1.1"/>
      <text x="528" y="186" font-weight="600">glob match</text>
      <text x="528" y="201" font-size="10">Tool(prefix*)</text>
      <rect x="516" y="216" width="118" height="40" rx="9" fill="#000000" fill-opacity="0.25" stroke="#FB923C" stroke-width="1.1"/>
      <text x="528" y="232" font-weight="600">lockfile drift</text>
      <text x="528" y="247" font-size="10">~/.skillsig/lock</text>
    </g>
  </g>

  <!-- Verifier -->
  <g>
    <rect x="712" y="84" width="128" height="176" rx="15" fill="#8985FF" fill-opacity="0.12" stroke="#8985FF" stroke-width="1.5"/>
    <text x="776" y="110" text-anchor="middle" font-size="15" font-weight="600" fill="#B6B3FF">Verifier</text>
    <g font-size="11" fill="#B6B3FF">
      <text x="776" y="142" text-anchor="middle">bundle check</text>
      <rect x="726" y="156" width="100" height="34" rx="8" fill="#8985FF" fill-opacity="0.14" stroke="#8985FF" stroke-width="1.1"/>
      <text x="776" y="177" text-anchor="middle" font-size="10.5">ed25519 (dev)</text>
      <rect x="726" y="196" width="100" height="34" rx="8" fill="#8985FF" fill-opacity="0.14" stroke="#8985FF" stroke-width="1.1"/>
      <text x="776" y="217" text-anchor="middle" font-size="10.5">Sigstore keyless</text>
    </g>
  </g>

  <!-- Report / verdict row -->
  <g stroke="#3A3A44" stroke-width="1.6" fill="none">
    <line x1="575" y1="260" x2="575" y2="316" marker-end="url(#ah-d)"/>
  </g>
  <g>
    <rect x="40" y="318" width="800" height="48" rx="13" fill="#2DC79A" fill-opacity="0.10" stroke="#2DC79A" stroke-width="1.5"/>
    <text x="58" y="347" font-size="13.5" font-weight="600" fill="#5BE0BC">Report — 3-color table · CI gate (--ci exits non-zero)</text>
    <g font-size="12" font-weight="700">
      <rect x="470" y="330" width="108" height="24" rx="7" fill="#2DC79A" fill-opacity="0.22" stroke="#2DC79A" stroke-width="1.1"/>
      <text x="524" y="347" text-anchor="middle" fill="#5BE0BC">TRUSTED</text>
      <rect x="586" y="330" width="108" height="24" rx="7" fill="#A1A1A8" fill-opacity="0.20" stroke="#A1A1A8" stroke-width="1.1"/>
      <text x="640" y="347" text-anchor="middle" fill="#C9C9D0">UNSIGNED</text>
      <rect x="702" y="330" width="120" height="24" rx="7" fill="#F87171" fill-opacity="0.20" stroke="#F87171" stroke-width="1.1"/>
      <text x="762" y="347" text-anchor="middle" fill="#F8A39B">SCOPE-DRIFTED</text>
    </g>
  </g>
</svg>
